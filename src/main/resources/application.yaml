spring:
  application:
    name: otp-project
  datasource:
    url: jdbc:postgresql://localhost:5432/otp_db
    username: postgres
    password: password
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    enabled: false
  mail:
    host: smtp.yandex.ru
    port: 587
    username: ${EMAIL_USERNAME}
    password: ${EMAIL_PASSWORD}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

jwt:
  secret: ${JWT_SECRET}
  expiration: 3600000

otp:
  length: 6
  ttl: 120

telegram:
  token: ${TG_TOKEN}
  api-url: https://api.telegram.org/bot

smpp:
  host: localhost
  port: 2775
  system_id: smppclient1
  password: password
  system_type: OTP
  source_addr: OTPService

logging:
  level:
    root: INFO